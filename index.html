<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biscuit Kpop | 奶油档案馆</title>
    
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

    <style>
        :root {
            --cream-bg: #fffcfc;
            --soft-pink: #ffeef2;
            --accent-pink: #ffb7c5;
            --deep-pink: #f8a5b9;
            --text-color: #7a6666;
            --white: #ffffff;
            --overlay: rgba(0, 0, 0, 0.3);
        }

        html { scroll-behavior: smooth; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; margin: 0; background-color: var(--cream-bg); color: var(--text-color); overflow-x: hidden; }

        /* --- 导航栏 --- */
        nav {
            position: fixed; top: 0; width: 100%; height: 70px; display: flex; 
            justify-content: space-between; align-items: center; padding: 0 5%;
            z-index: 1000; box-sizing: border-box; background: rgba(255, 252, 252, 0.7);
            backdrop-filter: blur(10px);
        }
        .logo { font-size: 1.5rem; color: var(--deep-pink); cursor: pointer; font-weight: 800; letter-spacing: -0.5px; }
        .nav-right { display: flex; gap: 15px; align-items: center; }
        .user-btn { background: var(--white); padding: 8px 15px; border-radius: 20px; font-size: 0.85rem; border: 1px solid var(--soft-pink); cursor: pointer; color: var(--text-color); font-weight: 600; transition: 0.3s; }

        /* --- 1. 首屏轮播 --- */
        .hero-viewport {
            position: relative; width: 100%; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center;
        }
        .slideshow { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .slide { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; animation: slideAnimation 18s infinite; }
        .slide:nth-child(1) { background-image: linear-gradient(var(--overlay), var(--overlay)), url('https://picui.ogmua.cn/s1/2026/03/23/69c0bcf5beb61.webp'); animation-delay: 0s; }
        .slide:nth-child(2) { background-image: linear-gradient(var(--overlay), var(--overlay)), url('https://picui.ogmua.cn/s1/2026/03/23/69c0bae34c38a.webp'); animation-delay: 6s; }
        .slide:nth-child(3) { background-image: linear-gradient(var(--overlay), var(--overlay)), url('https://picui.ogmua.cn/s1/2026/03/23/69c0e9ae23daa.webp'); animation-delay: 12s; }
        @keyframes slideAnimation { 0% { opacity: 0; transform: scale(1.1); } 10% { opacity: 1; } 33% { opacity: 1; } 43% { opacity: 0; transform: scale(1); } 100% { opacity: 0; } }

        .hero-content h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); margin: 0; letter-spacing: 10px; font-weight: 900; text-transform: uppercase; }
        .hero-content p { font-size: 1.1rem; margin: 15px 0 45px; letter-spacing: 3px; font-weight: 300; }
        .action-group { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        .action-btn { min-width: 160px; padding: 16px 32px; background: var(--white); color: var(--text-color); text-decoration: none; border-radius: 5px; font-weight: 600; transition: 0.4s; border: none; cursor: pointer; }
        .btn-primary { background: #ff4d6d; color: white; }

        /* --- 2. 概念照卡片 --- */
        #concepts { padding: 100px 8% 80px; background: var(--cream-bg); }
        .section-title { font-size: 1.8rem; letter-spacing: 4px; color: var(--accent-pink); margin-bottom: 20px; font-weight: 800; text-align: center; }
        .search-container { max-width: 600px; margin: 0 auto 50px; text-align: center; }
        .search-input { width: 100%; padding: 15px 30px; border-radius: 40px; border: 2px solid var(--soft-pink); font-size: 1rem; outline: none; box-sizing: border-box; }
        .group-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .group-card { background: var(--white); border-radius: 30px; padding: 15px; transition: 0.4s; cursor: pointer; box-shadow: 0 10px 25px rgba(255,183,197,0.1); }
        .group-card img { width: 100%; aspect-ratio: 4/3; border-radius: 20px; object-fit: cover; }

        /* --- 3. 专辑收听板块 --- */
        #music-hub { padding: 80px 0 120px; background: var(--white); text-align: center; border-top: 1px solid var(--soft-pink); }
        .music-slider { display: flex; gap: 20px; overflow-x: auto; padding: 0 8% 30px; scrollbar-width: none; scroll-snap-type: x mandatory; }
        .music-slider::-webkit-scrollbar { display: none; }
        .album-card { width: 160px; flex-shrink: 0; cursor: pointer; transition: 0.3s; scroll-snap-align: start; text-align: left; }
        .album-card img { width: 160px; height: 160px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); object-fit: cover; }

        /* 详情页 & 预览器 */
        #detail-view { display: none; padding: 100px 5% 60px; min-height: 100vh; background: var(--cream-bg); }
        .back-btn { margin-bottom: 30px; color: var(--accent-pink); cursor: pointer; font-weight: bold; display: inline-block; }
        .album-grid-view { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .album-view-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 20px; cursor: pointer; }
        .photo-gallery { column-count: 4; column-gap: 15px; }
        .photo-item { margin-bottom: 15px; break-inside: avoid; border-radius: 12px; overflow: hidden; cursor: pointer; }
        .photo-item img { width: 100%; display: block; transition: 0.5s; }
        .viewer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 5000; display: none; justify-content: center; align-items: center; }
        .viewer-img { max-width: 90%; max-height: 90%; object-fit: contain; }
        .viewer-btn { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 3rem; cursor: pointer; padding: 20px; }

        /* 弹窗样式 */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .modal-card { background: var(--white); width: 90%; max-width: 400px; padding: 35px; border-radius: 40px; text-align: center; box-shadow: 0 20px 50px rgba(255,183,197,0.3); }
        .modal-input { width: 100%; padding: 14px; margin: 8px 0; border: 1px solid var(--soft-pink); border-radius: 12px; box-sizing: border-box; outline: none; font-size: 0.95rem; }

        footer { text-align: center; padding: 40px 60px; background: var(--soft-pink); }
    </style>
</head>
<body>

    <nav>
        <div class="logo" onclick="showHome()">小饼干档案馆</div>
        <div class="nav-right">
            <div class="user-btn" style="color:var(--deep-pink); border-color:var(--accent-pink);" onclick="openModal('supportModal')">💖 支持作者</div>
            <div id="nav-auth-btn" class="user-btn" onclick="openModal('authModal')">登录 / 注册</div>
        </div>
    </nav>

    <section class="hero-viewport">
        <div class="slideshow"><div class="slide"></div><div class="slide"></div><div class="slide"></div></div>
        <div class="hero-content">
            <h1>BISCUIT KPOP</h1>
            <p>探索回归瞬间与视觉美学</p>
            <div class="action-group">
                <a href="#concepts" class="action-btn">概念照 ARCHIVE</a>
                <a href="#music-hub" class="action-btn btn-primary">专辑收听 HUB</a>
            </div>
        </div>
    </section>

    <main id="home-view">
        <section id="concepts">
            <div class="section-title">CONCEPT ARCHIVE</div>
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" onkeyup="searchGroups()" placeholder="搜索团体或专辑...">
            </div>
            <div class="group-grid" id="groupGrid"></div>
        </section>

        <section id="music-hub">
            <div class="section-title">MUSIC LATEST</div>
            <div class="music-slider" id="musicSlider"></div>
        </section>
    </main>

    <div id="detail-view"><div id="detail-content"></div></div>

    <div id="viewer" class="viewer-overlay">
        <span style="position:absolute; top:20px; right:30px; color:white; font-size:2.5rem; cursor:pointer;" onclick="closeViewer()">&times;</span>
        <div class="viewer-btn" style="left:20px;" onclick="changeImg(-1)">&#10094;</div>
        <img id="viewer-img" class="viewer-img" src="">
        <div class="viewer-btn" style="right:20px;" onclick="changeImg(1)">&#10095;</div>
    </div>

    <div id="authModal" class="modal-overlay" onclick="closeModal('authModal')">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h2 style="color: var(--deep-pink); margin-bottom: 25px;">加入档案馆 🫧</h2>
            <input type="text" id="usernameInput" class="modal-input" placeholder="用户昵称">
            <input type="email" id="emailInput" class="modal-input" placeholder="电子邮箱">
            <button onclick="handleLogin()" style="width:100%; padding:14px; background:var(--accent-pink); border:none; color:white; border-radius:12px; margin-top:15px; font-weight:bold; cursor:pointer; font-size:1rem;">立即开启</button>
            <p style="font-size: 0.75rem; color: #b0a4a4; margin-top: 15px;">注册即代表同意档案馆粉丝守则</p>
        </div>
    </div>

    <div id="supportModal" class="modal-overlay" onclick="closeModal('supportModal')">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3 style="color: var(--accent-pink);">Support Me</h3>
            <img src="https://picui.ogmua.cn/s1/2026/03/23/69c0bfbbd505a.webp" style="width:100%; border-radius:15px; border: 5px solid var(--soft-pink);">
            <p>感谢每一份喜爱 ♡</p>
            <button onclick="closeModal('supportModal')" style="margin-top:15px; background:none; border:none; color:var(--text-color); cursor:pointer;">关闭</button>
        </div>
    </div>

    <footer style="text-align: center; padding: 40px 60px; background: var(--soft-pink);">
        <div style="margin-bottom: 15px; font-size: 0.85rem; color: var(--text-color); opacity: 0.8;">
            <span id="busuanzi_container_site_pv" style="display:none; background: rgba(255,255,255,0.5); padding: 5px 15px; border-radius: 20px;">
                ✨ 档案馆今日已有 <span id="busuanzi_value_site_pv" style="font-weight: bold; color: var(--deep-pink);"></span> 位访客
            </span>
        </div>
        <div style="opacity: 0.4; font-size: 0.8rem;">© 2026 BISCUIT KPOP · MADE FOR FANS</div>
    </footer>

    <script>
        const archiveData = {
            'BTS': { cover: 'https://picui.ogmua.cn/s1/2026/03/23/69c0e9ae23daa.webp', albums: [{ title: "ARIRANG", date: "2026.03.20", images: ["https://picui.ogmua.cn/s1/2026/03/23/69c0e9ae23daa.webp","https://picui.ogmua.cn/s1/2026/03/23/69c0e3dcda435.webp", "https://picui.ogmua.cn/s1/2026/03/23/69c0e3e5563d3.webp", "https://picui.ogmua.cn/s1/2026/03/23/69c0e3e7101c8.webp"] }] },
            'IVE': { cover: 'https://picui.ogmua.cn/s1/2026/03/23/69c0e9707a126.webp', albums: [{ title: "REVIVE+", date: "2026.02.23", images: ["https://picui.ogmua.cn/s1/2026/03/23/69c0e4c89619a.webp","https://picui.ogmua.cn/s1/2026/03/23/69c0e4d26557f.webp","https://picui.ogmua.cn/s1/2026/03/23/69c0e4ce49530.webp"] }] },
            'YUNA': { cover: 'https://picui.ogmua.cn/s1/2026/03/23/69c1061a2e78a.webp', albums: [{ title: "Ice Cream", date: "2026.03.23", images: ["https://picui.ogmua.cn/s1/2026/03/23/69c1059d39631.webp","https://picui.ogmua.cn/s1/2026/03/23/69c1059f5c3e2.webp","https://picui.ogmua.cn/s1/2026/03/23/69c1059f2d441.webp", "http://raw.githubusercontent.com/lovol576/kpop-picture/refs/heads/main/20260322_221222.jpg", "https://raw.githubusercontent.com/lovol576/kpop-picture/refs/heads/main/20260322_221234.jpg"] }] }
        },
            'YUQI': { cover: 'https://pbs.twimg.com/media/G0eAL9saEAAC6IW?format=jpg&name=large', albums: [{ title: "Motivation",date: "2025.09.16", images: ["https://pbs.twimg.com/media/G0eAL9dbgAQoy37?format=jpg&name=large", "https://pbs.twimg.com/media/G0eAL96bYAAEeh6?format=jpg&name=large","https://pbs.twimg.com/media/G0eAL9saEAAC6IW?format=jpg&name=large","https://pbs.twimg.com/media/G0fl38Ka4AAPSsr?format=jpg&name=large"] }] };

        const albumMusicData = [
            { title: "Ice Cream", artist: "YUNA", cover: "https://picui.ogmua.cn/s1/2026/03/23/69c104e92463c.webp", link: "https://pan.baidu.com/s/1G6_S10y6uy3_Lc8IP8EtnQ?pwd=hw32" },
            { title: "ARIRANG", artist: "BTS", cover: "https://picui.ogmua.cn/s1/2026/03/23/69c0e73eb6f0d.webp", link: "https://pan.baidu.com/s/17j7fUpBt_VtoTaqvI8bQag?pwd=2xwr" },
            { title: "REVIVE+", artist: "IVE", cover: "https://picui.ogmua.cn/s1/2026/03/23/69c0eb34891ff.webp", link: "https://pan.baidu.com/s/1hoaVR8S24O2lsPnoadTAEQ?pwd=3bkh " }
        ];

        let currentPhotoList = [];
        let currentIndex = 0;

        function renderHome() {
            const grid = document.getElementById('groupGrid'); grid.innerHTML = '';
            for (const [name, data] of Object.entries(archiveData)) {
                grid.innerHTML += `<div class="group-card" onclick="showAlbums('${name}')"><img src="${data.cover}"><h3>${name}</h3><p>${data.albums.length} Albums</p></div>`;
            }
            const slider = document.getElementById('musicSlider'); slider.innerHTML = '';
            albumMusicData.forEach(album => {
                slider.innerHTML += `<div class="album-card" onclick="window.open('${album.link}', '_blank')"><img src="${album.cover}"><h4>${album.title}</h4><p>${album.artist}</p></div>`;
            });
        }

        function handleLogin() {
            const name = document.getElementById('usernameInput').value;
            const email = document.getElementById('emailInput').value;
            if(!name || !email) { alert("请填写完整信息哦 🫧"); return; }
            document.getElementById('nav-auth-btn').innerText = `Hello, ${name}`;
            closeModal('authModal');
        }

        function showAlbums(groupName) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            const group = archiveData[groupName];
            let html = `<div class="back-btn" onclick="showHome()">← 返回列表</div><h1>${groupName}</h1><div class="album-grid-view">`;
            group.albums.forEach((album, idx) => {
                html += `<div class="album-view-card" onclick="showPhotos('${groupName}', ${idx})"><img src="${album.images[0]}"><h3>${album.title}</h3><p>${album.date}</p></div>`;
            });
            document.getElementById('detail-content').innerHTML = html + `</div>`;
            window.scrollTo(0,0);
        }

        function showPhotos(groupName, albumIdx) {
            const album = archiveData[groupName].albums[albumIdx];
            currentPhotoList = album.images;
            let html = `<div class="back-btn" onclick="showAlbums('${groupName}')">← 返回专辑</div><h1>${album.title}</h1><div class="photo-gallery">`;
            album.images.forEach((img, idx) => { html += `<div class="photo-item" onclick="openViewer(${idx})"><img src="${img}"></div>`; });
            document.getElementById('detail-content').innerHTML = html + `</div>`;
        }

        function openViewer(idx) { currentIndex = idx; document.getElementById('viewer-img').src = currentPhotoList[currentIndex]; document.getElementById('viewer').style.display = 'flex'; document.body.style.overflow = 'hidden'; }
        function closeViewer() { document.getElementById('viewer').style.display = 'none'; document.body.style.overflow = 'auto'; }
        function changeImg(step) { currentIndex = (currentIndex + step + currentPhotoList.length) % currentPhotoList.length; document.getElementById('viewer-img').src = currentPhotoList[currentIndex]; }
        
        function showHome() { document.getElementById('home-view').style.display = 'block'; document.getElementById('detail-view').style.display = 'none'; }
        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function searchGroups() {
            const filter = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.group-card');
            cards.forEach(card => {
                const name = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = name.includes(filter) ? 'block' : 'none';
            });
        }
        renderHome();
    </script>
</body>
</html>
